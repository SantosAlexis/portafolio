<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <title>404 | Página no encontrada</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <style>
            body {
                margin: 0;
                font-family: Arial, sans-serif;
                background: #0f172a;
                color: white;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                text-align: center;
            }

            .box {
                max-width: 500px;
            }

            h1 {
                font-size: 100px;
                margin: 0;
                color: #6366f1;
            }

            p {
                color: #cbd5e1;
            }

            a {
                display: inline-block;
                margin-top: 20px;
                padding: 12px 20px;
                background: #6366f1;
                color: white;
                text-decoration: none;
                border-radius: 6px;
            }

            a:hover {
                background: #4f46e5;
            }
        </style>
    </head>
    <body>
        <div class="box">
            <h1>404</h1>
            <p>La página que buscas no existe o la ruta cambió.</p>
            <a href="/portafolio">Volver al Inicio</a>
        </div>
    </body>
</html>
